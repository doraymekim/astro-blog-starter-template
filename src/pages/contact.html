<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .inner-nav .nav-link { color: #111; }
    .contact-wrapper { max-width: 600px; margin: 120px auto 60px auto; padding: 0 20px; }
    .contact-wrapper h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .contact-form { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-weight: 600; font-size: 0.9rem; }
    .form-group input, .form-group textarea { padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
    .form-group textarea { resize: vertical; min-height: 150px; }
    .btn-submit { padding: 14px; background-color: #111; color: #fff; border: none; border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-submit:hover { background-color: #333; }
  </style>
</head>
<body>

  <header class="main-header inner-nav">
    <nav class="nav-left">
      <a href="index.html" class="nav-link">← Home</a>
      <a href="bio.html" class="nav-link">Bio</a>
    </nav>
  </header>

  <div class="contact-wrapper">
    <h1>Contact</h1>
    <p>For bookings, scoring inquiries, or general questions, please drop a message below.</p>

    <form class="contact-form" action="#" method="POST">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <button type="submit" class="btn-submit">Send Message</button>
    </form>
  </div>

</body>
</html>
